version: '3.8'

networks:
  evoting:
    name: evoting_network

volumes:
  orderer.ficct.edu.bo:
  peer0.ficct.edu.bo:
  couchdb0:
  peer1.ficct.edu.bo:
  couchdb1:

services:
  # ── Fabric CA ──────────────────────────────────────────────────────────────
  ca.ficct.edu.bo:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.ficct.edu.bo
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-ficct
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./fabric-ca/ficct:/etc/hyperledger/fabric-ca-server
    ports:
      - "7054:7054"
    networks:
      - evoting

  # ── Orderer ────────────────────────────────────────────────────────────────
  orderer.ficct.edu.bo:
    image: hyperledger/fabric-orderer:2.5
    container_name: orderer.ficct.edu.bo
    hostname: orderer.ficct.edu.bo
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:17050
    volumes:
      - ./crypto-material/ordererOrganizations/ficct.edu.bo/orderers/orderer.ficct.edu.bo/msp:/var/hyperledger/orderer/msp
      - ./crypto-material/ordererOrganizations/ficct.edu.bo/orderers/orderer.ficct.edu.bo/tls:/var/hyperledger/orderer/tls
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block
      - orderer.ficct.edu.bo:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "17050:17050"
    networks:
      evoting:
        aliases:
          - orderer.ficct.edu.bo

  # ── CouchDB (peer state database) ─────────────────────────────────────────
  couchdb0:
    image: couchdb:3.2
    container_name: couchdb0
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    volumes:
      - couchdb0:/opt/couchdb/data
    ports:
      - "5984:5984"
    networks:
      - evoting

  # ── Peer ───────────────────────────────────────────────────────────────────
  peer0.ficct.edu.bo:
    image: hyperledger/fabric-peer:2.5
    container_name: peer0.ficct.edu.bo
    hostname: peer0.ficct.edu.bo
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=evoting_network
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.ficct.edu.bo
      - CORE_PEER_ADDRESS=peer0.ficct.edu.bo:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.ficct.edu.bo:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.ficct.edu.bo:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.ficct.edu.bo:7051
      - CORE_PEER_LOCALMSPID=FICCTOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-material/peerOrganizations/ficct.edu.bo/peers/peer0.ficct.edu.bo/msp:/etc/hyperledger/fabric/msp
      - ./crypto-material/peerOrganizations/ficct.edu.bo/peers/peer0.ficct.edu.bo/tls:/etc/hyperledger/fabric/tls
      - peer0.ficct.edu.bo:/var/hyperledger/production
    ports:
      - "7051:7051"
      - "9444:9444"
    depends_on:
      - couchdb0
      - orderer.ficct.edu.bo
    networks:
      evoting:
        aliases:
          - peer0.ficct.edu.bo

  # ── CouchDB 1 ─────────────────────────────────────────────────────────────
  couchdb1:
    image: couchdb:3.2
    container_name: couchdb1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    volumes:
      - couchdb1:/opt/couchdb/data
    ports:
      - "6984:5984"
    networks:
      - evoting

  # ── Peer 1 ─────────────────────────────────────────────────────────────────
  peer1.ficct.edu.bo:
    image: hyperledger/fabric-peer:2.5
    container_name: peer1.ficct.edu.bo
    hostname: peer1.ficct.edu.bo
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=evoting_network
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer1.ficct.edu.bo
      - CORE_PEER_ADDRESS=peer1.ficct.edu.bo:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer1.ficct.edu.bo:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.ficct.edu.bo:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.ficct.edu.bo:8051
      - CORE_PEER_LOCALMSPID=FICCTOrgMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9445
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-material/peerOrganizations/ficct.edu.bo/peers/peer1.ficct.edu.bo/msp:/etc/hyperledger/fabric/msp
      - ./crypto-material/peerOrganizations/ficct.edu.bo/peers/peer1.ficct.edu.bo/tls:/etc/hyperledger/fabric/tls
      - peer1.ficct.edu.bo:/var/hyperledger/production
    ports:
      - "8051:8051"
      - "9445:9445"
    depends_on:
      - couchdb1
      - orderer.ficct.edu.bo
    networks:
      evoting:
        aliases:
          - peer1.ficct.edu.bo

  # ── CLI (admin operations) ─────────────────────────────────────────────────
  cli:
    image: hyperledger/fabric-tools:2.5
    container_name: cli
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.ficct.edu.bo:7051
      - CORE_PEER_LOCALMSPID=FICCTOrgMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/crypto/peerOrganizations/ficct.edu.bo/peers/peer0.ficct.edu.bo/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/crypto/peerOrganizations/ficct.edu.bo/peers/peer0.ficct.edu.bo/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/crypto/peerOrganizations/ficct.edu.bo/peers/peer0.ficct.edu.bo/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/crypto/peerOrganizations/ficct.edu.bo/users/Admin@ficct.edu.bo/msp
      - ORDERER_CA=/crypto/ordererOrganizations/ficct.edu.bo/orderers/orderer.ficct.edu.bo/msp/tlscacerts/tlsca.ficct.edu.bo-cert.pem
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-material:/crypto
      - ./channel-artifacts:/channel-artifacts
      - ../chaincode:/chaincode
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    depends_on:
      - peer0.ficct.edu.bo
    networks:
      evoting:
        aliases:
          - cli
